# Cross-platform binary release pipeline.
#
# SPEC: SPEC-PACKAGE-001 (PACKAGE-D, REQ-PKG-008 / REQ-PKG-009)
# Issue: ISSUE-0009
#
# Triggers on tag push (v*) — builds the PyOxidizer single-binary for the
# 5-platform matrix, generates SHA256SUMS.txt, optionally cosign-signs the
# linux + darwin artifacts (keyless, OIDC), regenerates man pages, and
# uploads everything to the GitHub Release.
#
# Pragmatic floor (AC2): linux-x86_64 + darwin-arm64 + windows-x86_64 MUST
# succeed. darwin-x86_64 + linux-aarch64 are allowed to fail without breaking
# the release upload (continue-on-error). Their slots remain in the matrix so
# they light up green as soon as runner/cross-compile issues resolve.
#
# Actions are pinned by SHA per supply-chain hygiene (PM Technical Note 7).
# Bump by resolving the new tag's commit SHA via the GitHub API:
#   curl -fsSL https://api.github.com/repos/<owner>/<repo>/git/refs/tags/<tag>
name: release-binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Fake release tag (e.g. v0.0.0-test)'
        required: true
        default: 'v0.0.0-test'

# contents:write  -> upload assets to the Release.
# id-token:write  -> cosign keyless OIDC (tag pushes only; gated in sign job).
permissions:
  contents: write
  id-token: write

env:
  PYTHON_VERSION: '3.10'
  # man-pages runs on the host (no PyOxidizer constraint), so use a Python
  # that satisfies the package's requires-python >=3.11.
  MANPAGES_PYTHON_VERSION: '3.13'
  PYOXIDIZER_VERSION: '0.24.0'

jobs:
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    # darwin-x86_64 + linux-aarch64 are fast-follow; allow failure without
    # blocking the release upload (AC2 pragmatic floor: 3/5 must pass).
    continue-on-error: ${{ matrix.optional || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
            target_triple: x86_64-unknown-linux-gnu
            asset_name: mnemosyne-linux-x86_64
          - platform: linux-aarch64
            runner: ubuntu-latest
            target_triple: aarch64-unknown-linux-gnu
            asset_name: mnemosyne-linux-aarch64
            optional: true
            # Cross-compile from x86_64 (requires aarch64 cross toolchain +
            # manylinux_aarch64 wheel from maturin). If GH's native arm64
            # runner (ubuntu-24.04-arm) is out of preview, switch runner +
            # drop the cross toolchain step.
          - platform: darwin-arm64
            runner: macos-14
            target_triple: aarch64-apple-darwin
            asset_name: mnemosyne-darwin-arm64
          - platform: darwin-x86_64
            runner: macos-13
            target_triple: x86_64-apple-darwin
            asset_name: mnemosyne-darwin-x86_64
            optional: true
          - platform: windows-x86_64
            runner: windows-latest
            target_triple: x86_64-pc-windows-msvc
            asset_name: mnemosyne-windows-x86_64.exe

    steps:
      - name: checkout (full history for man pages)
        # actions/checkout@v4 (v4.2.2) — SHA-pinned.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: setup python
        # actions/setup-python@v5 (v5.6.0) — SHA-pinned.
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: install rust toolchain (linux + darwin)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable

      - name: install rust toolchain (windows)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: install aarch64 cross toolchain (linux-aarch64 only)
        if: matrix.platform == 'linux-aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: install python build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyoxidizer==${{ env.PYOXIDIZER_VERSION }} maturin uv
          # build_binary.sh resolves the interpreter as `python3.10` first,
          # then via `uv python find`. setup-python exposes `python`/`python3`
          # but not the version-suffixed alias on every runner image (notably
          # windows-latest), and uv installs its managed CPython to ~/.local/bin
          # which is NOT on PATH within the same step. So always provision 3.10
          # via uv (idempotent) and let build_binary.sh's uv fallback resolve
          # it — do NOT verify via the bare `python3.10` alias here, that breaks
          # on runners where only uv knows the interpreter.
          uv python install "${{ env.PYTHON_VERSION }}"
          uv python find "${{ env.PYTHON_VERSION }}"

      - name: build binary
        shell: bash
        env:
          TARGET_TRIPLE: ${{ matrix.target_triple }}
        run: scripts/build_binary.sh

      - name: rename artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp build/mnemosyne "artifacts/${{ matrix.asset_name }}"
          # Companion lib/ + FILESYSTEM_PACKAGES dirs (linux/darwin) — ship as
          # a per-platform tarball so the install scripts can fetch a single
          # archive per platform. (install.sh fetches just the bare binary
          # for now; the tarball is for offline / package-manager consumers.)
          if [ -d build/lib ] || [ -d build/jsonschema_specifications ]; then
            tar -czf "artifacts/${{ matrix.asset_name }}.dist.tar.gz" -C build \
              $(ls -d build/lib build/jsonschema_specifications build/referencing 2>/dev/null | sed 's|^build/||')
          fi

      - name: smoke test (mnemosyne --help)
        shell: bash
        run: |
          "artifacts/${{ matrix.asset_name }}" --help
          # darwin-arm64: extra mcp serve boot smoke (frozen-import hazard,
          # PM Technical Note 5). Background + kill — verify no crash on boot.
          if [ "${{ matrix.platform }}" = "darwin-arm64" ]; then
            "artifacts/${{ matrix.asset_name }}" mcp serve &
            MCP_PID=$!
            sleep 2
            kill $MCP_PID || true
          fi

      - name: compute sha256
        shell: bash
        run: |
          cd artifacts
          # sha256sum on linux/windows-MSYS; shasum fallback on darwin.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          else
            shasum -a 256 ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          fi

      - name: upload build artifact
        # actions/upload-artifact@v4 — SHA-pinned.
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: build-${{ matrix.platform }}
          path: artifacts/
          retention-days: 7

  man-pages:
    name: man pages
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: setup python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ env.MANPAGES_PYTHON_VERSION }}
      - name: install mnemosyne (for gen_manpages)
        run: |
          python -m pip install --upgrade pip
          # gen_manpages imports mnemosyne.cli to walk the argparse tree.
          pip install -e .
      - name: regenerate man pages
        run: python scripts/gen_manpages.py
      - name: package
        # Sanitize tag: workflow_dispatch inputs.tag is maintainer-controlled
        # (not a webhook payload), but strip any path separators / shell-special
        # chars defensively before using it in a filename.
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${GITHUB_REF_NAME:-${INPUT_TAG}}"
          TAG="${TAG:-untagged}"
          # Strip anything that isn't [A-Za-z0-9._-]
          TAG="$(printf '%s' "$TAG" | tr -c 'A-Za-z0-9._-' '_')"
          mkdir -p artifacts
          tar -czf "artifacts/man-pages-${TAG}.tar.gz" -C docs man
      - name: upload man-pages artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: man-pages
          path: artifacts/

  release:
    name: aggregate + release upload
    runs-on: ubuntu-latest
    needs: [build, man-pages]
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: download all artifacts
        # actions/download-artifact@v4 — SHA-pinned.
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          path: all-artifacts
          merge-multiple: false

      - name: flatten + build SHA256SUMS.txt
        run: |
          mkdir -p release-assets
          # Flatten: every build-*/mnemosyne-<platform> + *.sha256 into one dir.
          find all-artifacts -type f -name 'mnemosyne-*' ! -name '*.sha256' \
            -exec cp {} release-assets/ \;
          # Aggregate checksum file (AC3).
          cd release-assets
          find . -maxdepth 1 -type f -name 'mnemosyne-*' ! -name '*.sha256' \
            -exec sha256sum {} \; > SHA256SUMS.txt
          # Move per-asset checksums alongside (cosign-free verification path).
          find ../all-artifacts -type f -name '*.sha256' -exec cp {} . \; 2>/dev/null || true
          # Man-pages tarball.
          find ../all-artifacts -name 'man-pages-*.tar.gz' -exec cp {} . \;
          # One-line installers (curl|sh / iwr|iex fetch these by bare name).
          cp ../scripts/install.sh install.sh
          cp ../scripts/install.ps1 install.ps1
          ls -la

      - name: upload to GitHub Release
        # softprops/action-gh-release@v2 — SHA-pinned.
        # Uploads all files in `files:` to the Release matching the tag.
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf6f9
        with:
          files: |
            release-assets/mnemosyne-*
            release-assets/SHA256SUMS.txt
            release-assets/man-pages-*.tar.gz
            release-assets/install.sh
            release-assets/install.ps1

  sign:
    name: cosign sign (keyless)
    runs-on: ubuntu-latest
    needs: [release]
    # cosign keyless requires id-token:write + a real tag push (not PR) for OIDC.
    if: startsWith(github.ref, 'refs/tags/v')
    # Signing MUST NOT break the release (PM AC4 / Key Risk 3). continue-on-error
    # means a transient sigstore outage or quota issue surfaces as a warning
    # but does not block the uploaded release. Operators re-run cosign verify
    # manually post-release (recorded in the release checklist).
    continue-on-error: true
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          path: all-artifacts

      - name: flatten
        run: |
          mkdir -p sign-assets
          find all-artifacts -type f \( -name 'mnemosyne-linux-*' -o -name 'mnemosyne-darwin-*' \) \
            ! -name '*.sha256' ! -name '*.tar.gz' -exec cp {} sign-assets/ \;

      - name: install cosign
        # sigstore/cosign-installer@v3 — SHA-pinned.
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd642cb0452ec9e2a40125bacf0

      - name: sign each artifact
        # cosign sign-blob --bundle writes <file>.sigstore bundle (keyless via
        # OIDC). Re-uploads signatures next to the binaries on the Release.
        run: |
          set -e
          for f in sign-assets/*; do
            echo "::group::signing $f"
            cosign sign-blob --yes --bundle="$f.sigstore" "$f"
            echo "::endgroup::"
          done

      - name: upload signatures to release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf6f9
        with:
          files: |
            sign-assets/*.sigstore
